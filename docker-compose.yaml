services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 270153
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
