syntax = "proto3";

package product.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/field_mask.proto";

option go_package = "azushop/api/product/v1;v1";

// api for both merchants and customers.
service ProductService {
  // list products by seller_id, generally used by customers.
  rpc ListProductsBySellerId(ListProductsBySellerIdRequest) returns (ListProductsBySellerIdResponse) {
    option (google.api.http) = {
      get:"/v1/sellers/{seller_id}/products"
    };
  };
  
  // list all the products of the merchant.
  rpc ListMerchantProducts(ListMerchantProductsRequest) returns (ListMerchantProductsResponse) {
    option (google.api.http) = {
      get: "/v1/merchant/products"
    };
  };

  // insert or update a product's details.
  rpc UpsertProduct(UpsertProductRequest) returns (UpsertProductResponse) {
    option (google.api.http) = {
      patch: "/v1/products/{id}"
      body: "*"
    };
  };
}

message SkuDetail {
  int64 id = 1;
  google.protobuf.Struct attrs = 2;
  string unit_price = 3;
}

message Sku {
  SkuDetail sku_detail = 1;
  int64 available_quantity = 2;
}

// sku message only used by merchant.
message MerchantSku {
  SkuDetail sku_detail = 1;
  int64 stock_quantity = 2;
  int64 reserved_quantity = 3;
}

message Product {
  int64 id = 1;
  string product_name = 2;
  // TODO: just extract it from token.
  int32 seller_id = 3;
  repeated Sku skus = 4;
}

message MerchantProduct {
  int64 id = 1;
  string product_name = 2;
  // TODO: just extract it from token.
  int32 seller_id = 3;
  repeated MerchantSku skus = 4;
}

message ListProductsBySellerIdRequest {
  // use 0 for the first request.
  int64 page_token = 1;
  // max 100
  int32 page_size = 2;
  int32 seller_id = 3;
}

message ListProductsBySellerIdResponse {
  repeated Product products = 1;
}

message ListMerchantProductsRequest {
  // use 0 for the first request.
  int64 page_token = 1;
  // max 100
  int32 page_size = 2;
}

message ListMerchantProductsResponse {
  repeated MerchantProduct products = 1;
}

message UpsertProductRequest {
  int64 id = 1;
  string product_name = 2;
  // TODO: just extract seller_id from token.
  int32 seller_id = 3;
  repeated SkuDetail sku_details = 4;
  google.protobuf.FieldMask update_mask = 5;
}

message UpsertProductResponse {}