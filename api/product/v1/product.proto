syntax = "proto3";

package product.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/field_mask.proto";

option go_package = "azushop/api/product/v1;v1";

// TODO: scope.
// product management api only for merchants
service ProductService {
  // List all the products.
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {
      get:"/v1/products"
    };
  };

  // Create a new product. 
  rpc CreateProduct(CreateProductRequest) returns (Product) {
    option (google.api.http) = {
      post: "/v1/products"
      body: "*"
    };
  };

  // Update a product's SKU and attributes information.
  rpc UpsertProduct(UpsertProductRequest) returns (UpsertProductResponse) {
    option (google.api.http) = {
      patch: "/v1/products/{id}"
      body: "*"
    };
  };

}

message ListProductsRequest {
  // use 0 for the first request.
  int64 page_token = 1;
  // max 100
  int32 page_size = 2;
}

message Sku {
  int64 id = 1;
  int64 product_id = 2;
  google.protobuf.Struct attrs = 3;
  int64 stock_quantity = 4;
  string unit_price = 5;
}

message Product {
  int64 id = 1;
  string product_name = 2;
  // TODO: just extract it from token.
  int32 seller_id = 3;
  repeated Sku skus = 4;
}

message ListProductsResponse {
  repeated Product products = 1;
}

message CreateProductRequest {
  Product product = 1;
}

message UpsertProductRequest {
  int64 id = 1;
  string product_name = 2;
  // TODO: just extract seller_id from token.
  int32 seller_id = 3;
  repeated Sku skus = 4;
  google.protobuf.FieldMask update_mask = 5;
}

message UpsertProductResponse {

}