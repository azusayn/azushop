syntax = "proto3";

package product.v1;

import "google/api/annotations.proto";

option go_package = "azushop/api/product/v1;v1";

// TODO: scope.
// product management.
service ProductService {
  // List all the products.
  rpc ListProducts(ListProductsRequest) returns (ListProductsRespone) {
    option (google.api.http) = {
      get:"/v1/products"
    };
  };

  // Create a new product. 
  rpc CreateProduct(CreateProductRequest) returns (Product) {
    option (google.api.http) = {
      post: "/v1/products"
      body: "*"
    };
  };
}

message ListProductsRequest {
  int64 page = 1;
  int64 page_size = 2;
}

message Product {
  int64 id = 1;
  string product_name = 2;
  int32 seller_id = 3;
  int64 intstock_quantity = 4;
  float unit_price = 5;
}

message ListProductsRespone {
  repeated Product products = 1;
}

message CreateProductRequest {
  // TODO: Field Mask.
  Product product = 1;
}
