syntax = "proto3";

package product.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";

option go_package = "azushop/api/product/v1;v1";

// api for both merchants and customers.
service ProductService {
  // list products by seller_id, generally used by customers.
  rpc ListSellerProducts(ListSellerProductsRequest) returns (ListSellerProductsResponse) {
    option (google.api.http) = {
      get:"/v1/sellers/{seller_id}/products"
    };
  };
  
  // insert or update products' details, used by administrators & merchants.
  rpc BatchUpsertProduct(BatchUpsertProductRequest) returns (BatchUpsertProductResponse) {
    option (google.api.http) = {
      patch: "/v1/products"
      body: "*"
    };
  };

  // TODO: publish & unpublish products.
  // TODO: search API using Postgres GIN.
}

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_DRAFT = 1;
  PRODUCT_STATUS_PENDING = 2;
  PRODUCT_STATUS_ACTIVE = 3;
  PRODUCT_STATUS_OFFLINE = 4;
}

message Sku {
  int64 id = 1;
  google.protobuf.Struct attrs = 2;
  string unit_price = 3;
}

message Product {
  int64 id = 1;
  string product_name = 2;
  int32 seller_id = 3;
  repeated Sku skus = 4;
  ProductStatus product_status = 5;
}

message ListSellerProductsRequest {
  // use 0 for the first request.
  int64 page_token = 1;
  // max 100
  int32 page_size = 2;
  int32 seller_id = 3;
  // filter by product status.
  optional ProductStatus product_status = 4;
}

message ListSellerProductsResponse {
  repeated Product products = 1;
}

message BatchUpsertProductRequest {
  repeated Product products = 1;
  google.protobuf.FieldMask update_mask = 2;
}

// TODO(2): update strategy and update results.
message BatchUpsertProductResponse {}

