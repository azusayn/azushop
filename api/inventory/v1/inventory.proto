syntax = "proto3";

package inventory.v1;

option go_package = "azushop/api/inventory/v1;v1";

// service for managing stocks.
service InventoryService {
  // interfaces used by merchants and administrators. 
  // sets stock to a specific quantity.
  rpc AdjustStock(AdjustStockRequest) returns (AdjustStockResponse);
  
  // retrieves SKU information for given SKU IDs.
  rpc BatchGetStock(BatchGetStockRequest) returns (BatchGetStockResponse);
  
  // interfaces used by internal services.
  // release reserved stock when a customer cancels an order.
  // TODO(3): remove it and use message queue.
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);

}

message AdjustStockRequest {
  // TODO(3): why string instead of int64 ?
  string sku_id = 1;
  int64 stock_quantity = 2;
}

message AdjustStockResponse {}

message BatchGetStockRequest {
  repeated string sku_ids = 1;
}

message SKUQuantity {
  int64 available_quantity = 1;
  optional int64 stock_quantity = 2;
  optional int64 reserved_quantity = 3;
}

message BatchGetStockResponse {
  // mapping from SKU ID to its stock information.
  map<string, SKUQuantity> stocks = 1;
}

message StockItem {
  string sku_id = 1;
  int64 quantity = 2;
}
message ReleaseStockRequest {
  int64 order_id = 1;
}

message ReleaseStockResponse {}

