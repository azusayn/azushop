syntax = "proto3";

package inventory.v1;

import "google/protobuf/struct.proto";
import "google/api/annotations.proto";

option go_package = "azushop/api/inventory/v1;v1";

// service for managing SKUs.
service InventoryService {
  // SKU management.
  rpc CreateSKU(CreateSKURequest) returns (CreateSKUResponse) {
    option (google.api.http) = {
      post: "/v1/products/{product_id}/skus"
      body: "*"
    };
  }
  
  // update sku with sku details.
  rpc UpdateSKU(UpdateSKURequest) returns (UpdateSKUResponse) {
    option (google.api.http) = {
      put: "/v1/skus"
      body: "*"
    };
  }

  // list skus by product id.
  rpc ListSKUs(ListSKUsRequest) returns (ListSKUsResponse) {
    option (google.api.http) = {
      get: "/v1/products/{product_id}/skus"
    };
  }

  // list skus by product id with full details(available, stock, reserved stocks).
  rpc AdminListSKUs(AdminListSKUsRequest) returns (AdminListSKUsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/products/{product_id}/skus"
    };
  }

  // Core inventory operations.
  // rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  // rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);
  // rpc ConfirmDeduct(ConfirmDeductRequest) returns (ConfirmDeductResponse);
  // rpc CompensateStock(CompensateStockRequest) returns (CompensateStockResponse);

  // Inventory query and alerts.
  // rpc GetStock(GetStockRequest) returns (GetStockResponse);
  // rpc BatchGetStock(BatchGetStockRequest) returns (BatchGetStockResponse);
  // rpc GetLowStockAlerts(GetLowStockAlertsRequest) returns (GetLowStockAlertsResponse);
}

message SkuDetail {
  int64 id = 1;
  google.protobuf.Struct attrs = 2;
  string unit_price = 3;
}

message Sku {
  SkuDetail sku_detail = 1;
  int64 available_quantity = 2;
}

// sku message only used by merchant.
message MerchantSku {
  SkuDetail sku_detail = 1;
  int64 stock_quantity = 2;
  int64 reserved_quantity = 3;
}

message CreateSKURequest {
  int64 product_id = 1;
  repeated SkuDetail sku_details = 2;
}

message CreateSKUResponse {}

message UpdateSKURequest {
  repeated SkuDetail sku_details = 1; 
}

message UpdateSKUResponse {}


message ListSKUsRequest {
  int64 product_id = 1;
}

message ListSKUsResponse {
  repeated Sku skus = 1;
}

message AdminListSKUsRequest {
  int64 product_id = 1;
}

message AdminListSKUsResponse {
  repeated MerchantSku skus = 1;
}

