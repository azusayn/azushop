static_resources:
  listeners:
    - name: azushop_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: grpc_proxy
                http2_protocol_options: {}
                route_config:
                  name: grpc_routes
                  virtual_hosts:
                    - name: azushop
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/auth.v1.AuthService/"
                          route:
                            cluster: auth_cluster
                        - match:
                            prefix: "/inventory.v1.InventoryService/"
                          route:
                            cluster: inventory_cluster
                        - match:
                            prefix: "/product.v1.ProductService/"
                          route:
                            cluster: product_cluster
                        - match:
                            prefix: "/order.v1.OrderService"
                          route:
                            cluster: order_cluster
                        - match:
                            prefix: "/payment.v1.PaymentService"
                          route:
                            cluster: payment_cluster
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  # TODO: EDS (Istio or Consul)
  clusters:
    # 1. Auth Service
    - name: auth_cluster
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: auth_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      { address: 192.168.68.163, port_value: 9000 }

    # 2. Inventory Service
    - name: inventory_cluster
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: inventory_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      { address: 192.168.68.163, port_value: 9001 }

    # 3. Product Service
    - name: product_cluster
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
